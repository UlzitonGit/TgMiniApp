<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FireBaseAuth Game</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    
    <!-- Firebase SDK - ТОЛЬКО ОДНА ВЕРСИЯ! Используем compat версию для совместимости -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    
    <script>
        // Глобальный конфиг Firebase для доступа из .jslib плагина
        window.FIREBASE_CONFIG = {
            apiKey: "AIzaSyC3DGCkNUQe9nDXGSG2kR1DHIi86fZ26to",
            authDomain: "auth-3913d.firebaseapp.com",
            databaseURL: "https://auth-3913d-default-rtdb.firebaseio.com",
            projectId: "auth-3913d",
            storageBucket: "auth-3913d.firebasestorage.app",
            messagingSenderId: "424357868187",
            appId: "1:424357868187:web:5d1a9a0ffb80e088c0cc3e"
        };
        
        // Инициализируем Firebase сразу
        if (typeof firebase !== 'undefined' && !firebase.apps.length) {
            firebase.initializeApp(window.FIREBASE_CONFIG);
            console.log(" Firebase initialized successfully");
            console.log("Firebase app name:", firebase.apps[0].name);
        } else if (typeof firebase !== 'undefined') {
            console.log("Firebase already initialized");
        } else {
            console.error(" Firebase SDK not loaded!");
        }
    </script>
</head>
<body>
    <div id="unity-container" style="position: absolute; width: 100%; height: 100%; left: 0%; top: 0%;">
        <canvas id="unity-canvas" style="position: absolute; width: 100%; height: 100%"></canvas>
        <div id="unity-loading-bar">
            <div id="unity-logo"></div>
            <div id="unity-progress-bar-empty">
                <div id="unity-progress-bar-full"></div>
            </div>
        </div>
        <div id="unity-warning"></div>
    </div>

    <script>
        var canvas = document.querySelector("#unity-canvas");

        function unityShowBanner(msg, type) {
            var warningBanner = document.querySelector("#unity-warning");
            function updateBannerVisibility() {
                warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
            }
            var div = document.createElement('div');
            div.innerHTML = msg;
            warningBanner.appendChild(div);
            if (type == 'error') div.style = 'background: red; padding: 10px;';
            else {
                if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
                setTimeout(function() {
                    warningBanner.removeChild(div);
                    updateBannerVisibility();
                }, 5000);
            }
            updateBannerVisibility();
        }

        // ПРОВЕРЬТЕ РЕАЛЬНЫЕ ИМЕНА ФАЙЛОВ В ПАПКЕ BUILD!
        // Если файлы называются иначе, измените имена ниже
        var buildUrl = "Build";
        var loaderUrl = buildUrl + "/Tgminiapp.loader.js";
        var config = {
            arguments: [],
            dataUrl: buildUrl + "/Tgminiapp.data",
            frameworkUrl: buildUrl + "/Tgminiapp.framework.js",
            codeUrl: buildUrl + "/Tgminiapp.wasm",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "DefaultCompany",
            productName: "FireBaseLogs",
            productVersion: "1.0",
            showBanner: unityShowBanner,
        };

        if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
            var meta = document.createElement('meta');
            meta.name = 'viewport';
            meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
            document.getElementsByTagName('head')[0].appendChild(meta);
            document.querySelector("#unity-container").className = "unity-mobile";
            canvas.className = "unity-mobile";
        } else {
            canvas.style.width = "100%";
            canvas.style.height = "100%";
        }

        document.querySelector("#unity-loading-bar").style.display = "block";

        var script = document.createElement("script");
        script.src = loaderUrl;
        script.onload = () => {
            createUnityInstance(canvas, config, (progress) => {
                document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
            }).then((unityInstance) => {
                window.unityInstance = unityInstance;
                document.querySelector("#unity-loading-bar").style.display = "none";
                console.log(" Unity instance created");
            }).catch((message) => {
                console.error("Unity error:", message);
                alert(message);
            });
        };
        script.onerror = () => {
            console.error("Failed to load Unity loader from:", loaderUrl);
            alert("Failed to load game. Check that build files exist in 'Build' folder.");
        };
        document.body.appendChild(script);
    </script>
</body>
</html>
